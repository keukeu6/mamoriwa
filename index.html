<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>まもりわ — 高齢者見守りアプリ</title>
<!-- PWA：ホーム画面に追加するとアプリとして全画面起動する -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00695c">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="まもりわ">
<style>
  :root {
    --green: #2e7d32;
    --green-deep: #1b5e20;
    --orange: #e65100;
    --orange-soft: rgba(255, 213, 158, 0.45);
    --gray: #5f6f6c;
    --text: #17302b;
    --accent: #00695c;
    --glass: rgba(255, 255, 255, 0.68);
    --glass-border: rgba(255, 255, 255, 0.75);
    --shadow-card: 0 8px 28px rgba(23, 48, 43, 0.10), 0 2px 6px rgba(23, 48, 43, 0.06);
    --shadow-float: 0 10px 24px rgba(46, 125, 50, 0.35), inset 0 1px 0 rgba(255,255,255,0.35);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(160deg, #e7f4ee 0%, #eaf1f6 55%, #f2eee9 100%);
    color: var(--text);
    font-size: 18px;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* 背景の色ブロブ：ガラスのぼかしに映る飾り */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 380px; height: 380px;
    background: rgba(94, 201, 173, 0.45);
    top: -100px; left: calc(50% - 320px);
  }
  body::after {
    width: 320px; height: 320px;
    background: rgba(255, 190, 130, 0.40);
    top: 45%; left: calc(50% + 60px);
  }

  .app {
    max-width: 430px;
    min-height: 100vh;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.30);
    box-shadow: 0 0 40px rgba(23, 48, 43, 0.12);
  }

  /* ---------- ヘッダー（ガラス・スクロールで下が透ける） ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 14px 16px 12px;
    /* ホーム画面起動時にノッチ・ステータスバーと重ならないようにする */
    padding-top: calc(14px + env(safe-area-inset-top));
    background: rgba(255, 255, 255, 0.62);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    backdrop-filter: blur(18px) saturate(1.5);
    border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 4px 20px rgba(23, 48, 43, 0.06);
  }
  .logo {
    font-size: 25px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(120deg, #00796b, #2e9e6b);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
  }
  .logo-sub { font-size: 13px; color: var(--gray); margin-left: 8px; }

  .tabs {
    position: relative;
    display: flex;
    margin-top: 10px;
    background: rgba(0, 105, 92, 0.10);
    border-radius: 14px;
    padding: 4px;
  }
  .tab-indicator {
    position: absolute;
    top: 4px; bottom: 4px; left: 4px;
    width: calc(50% - 4px);
    background: rgba(255, 255, 255, 0.95);
    border-radius: 11px;
    box-shadow: 0 3px 10px rgba(23, 48, 43, 0.15), inset 0 1px 0 #fff;
    transition: transform 0.35s var(--ease-out);
  }
  .tabs[data-view="family"] .tab-indicator { transform: translateX(100%); }
  .tabs button {
    flex: 1;
    position: relative;
    z-index: 1;
    border: none;
    background: transparent;
    color: var(--gray);
    font-size: 17px;
    font-weight: bold;
    font-family: inherit;
    padding: 11px 0;
    border-radius: 11px;
    cursor: pointer;
    transition: color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .tabs button.active { color: var(--accent); }
  .tabs button .badge {
    display: inline-block;
    min-width: 22px;
    padding: 1px 6px;
    margin-left: 6px;
    border-radius: 11px;
    background: linear-gradient(135deg, #ff8f3d, var(--orange));
    color: #fff;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(230, 81, 0, 0.4);
  }

  main { flex: 1; padding: 16px 14px 40px; }

  /* ビュー切り替え時のふわっと表示（要素ごとに時間差） */
  main.anim > * { animation: fadeUp 0.5s var(--ease-out) both; }
  main.anim > *:nth-child(2) { animation-delay: 0.05s; }
  main.anim > *:nth-child(3) { animation-delay: 0.10s; }
  main.anim > *:nth-child(4) { animation-delay: 0.14s; }
  main.anim > *:nth-child(5) { animation-delay: 0.18s; }
  main.anim > *:nth-child(6) { animation-delay: 0.22s; }
  main.anim > *:nth-child(7) { animation-delay: 0.26s; }
  main.anim > *:nth-child(8) { animation-delay: 0.30s; }
  main.anim > *:nth-child(n+9) { animation-delay: 0.34s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pop { animation: pop 0.4s var(--ease-spring) both; }
  @keyframes pop {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .section-title {
    font-size: 20px;
    font-weight: bold;
    margin: 24px 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title:first-child { margin-top: 4px; }

  /* ---------- ガラスカード ---------- */
  .card {
    background: var(--glass);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-card);
  }

  /* ---------- アラート ---------- */
  .alert {
    background: linear-gradient(135deg, rgba(255,243,224,0.85), rgba(255,224,178,0.75));
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border: 1.5px solid rgba(230, 81, 0, 0.45);
    border-radius: 20px;
    padding: 14px 16px;
    margin-bottom: 14px;
    font-size: 19px;
    font-weight: bold;
    color: var(--orange);
    box-shadow: 0 8px 24px rgba(230, 81, 0, 0.15);
  }
  .alert .alert-icon { display: inline-block; animation: swing 2.4s ease-in-out infinite; transform-origin: top center; }
  @keyframes swing {
    0%, 100% { transform: rotate(0); }
    10% { transform: rotate(12deg); }
    20% { transform: rotate(-10deg); }
    30% { transform: rotate(6deg); }
    40% { transform: rotate(0); }
  }

  /* ---------- 本人ビュー ---------- */
  .date-header { text-align: center; padding: 4px 0 12px; }
  .date-header .date { font-size: 22px; font-weight: bold; }
  .date-header .greet { font-size: 18px; color: var(--gray); margin-top: 2px; }

  .med-card { display: flex; align-items: center; gap: 12px; transition: background 0.4s; }
  .med-card.taken { background: linear-gradient(135deg, rgba(232,245,233,0.85), rgba(212,237,218,0.7)); border-color: rgba(46,125,50,0.25); }
  .med-card.due   { background: linear-gradient(135deg, rgba(255,243,224,0.85), rgba(255,236,204,0.7)); border-color: rgba(230,81,0,0.3); }
  .med-info { flex: 1; min-width: 0; }
  .med-name { font-size: 20px; font-weight: bold; }
  .med-time { font-size: 17px; color: var(--gray); margin-top: 2px; }
  .med-status-taken { font-size: 17px; color: var(--green); font-weight: bold; margin-top: 2px; }
  .med-status-due { font-size: 17px; color: var(--orange); font-weight: bold; margin-top: 2px; }

  /* 浮いているように見える主ボタン */
  .btn-take {
    border: none;
    background: linear-gradient(145deg, #43a047, #2e7d32);
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    font-family: inherit;
    padding: 0 22px;
    min-height: 64px;
    border-radius: 16px;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: var(--shadow-float);
    transition: transform 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-take:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(46,125,50,0.4), inset 0 1px 0 rgba(255,255,255,0.35); }
  .btn-take:active { transform: translateY(1px) scale(0.97); box-shadow: 0 4px 12px rgba(46,125,50,0.3); }
  .taken-mark { font-size: 34px; flex-shrink: 0; }
  .btn-undo {
    border: none;
    background: none;
    color: var(--gray);
    font-size: 14px;
    font-family: inherit;
    text-decoration: underline;
    cursor: pointer;
    flex-shrink: 0;
  }

  .mood-buttons { display: flex; gap: 10px; }
  .mood-btn {
    flex: 1;
    border: 2px solid rgba(255, 255, 255, 0.8);
    background: rgba(255, 255, 255, 0.55);
    border-radius: 18px;
    padding: 14px 4px;
    font-size: 17px;
    font-weight: bold;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 14px rgba(23, 48, 43, 0.08);
    transition: transform 0.18s var(--ease-out), box-shadow 0.18s, border-color 0.25s, background 0.25s;
    -webkit-tap-highlight-color: transparent;
  }
  .mood-btn .face { font-size: 36px; display: block; margin-bottom: 4px; transition: transform 0.25s var(--ease-spring); }
  .mood-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(23,48,43,0.13); }
  .mood-btn:active { transform: scale(0.95); }
  .mood-btn.selected {
    border-color: var(--green);
    background: linear-gradient(145deg, rgba(232,245,233,0.9), rgba(200,230,201,0.7));
    color: var(--green-deep);
    box-shadow: 0 6px 18px rgba(46, 125, 50, 0.25);
  }
  .mood-btn.selected .face { transform: scale(1.15); }

  .btn-voice {
    width: 100%;
    margin-top: 12px;
    border: none;
    background: linear-gradient(145deg, #00897b, #00695c);
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    font-family: inherit;
    min-height: 64px;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(0, 105, 92, 0.32), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.18s var(--ease-out), box-shadow 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-voice:hover { transform: translateY(-2px); }
  .btn-voice:active { transform: translateY(1px) scale(0.98); }
  .btn-voice.recording {
    background: linear-gradient(145deg, #e53935, #c62828);
    animation: ring 1.3s ease-out infinite;
  }
  @keyframes ring {
    0% { box-shadow: 0 0 0 0 rgba(198, 40, 40, 0.45); }
    100% { box-shadow: 0 0 0 20px rgba(198, 40, 40, 0); }
  }
  .btn-voice.recording .dot {
    display: inline-block;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  .voice-msg {
    margin-top: 10px;
    color: var(--orange);
    font-weight: bold;
    font-size: 16px;
  }
  .voice-note {
    margin-top: 12px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 17px;
  }
  .voice-note .label { font-size: 14px; color: var(--gray); display: block; margin-bottom: 4px; }

  .done-msg { margin-top: 10px; color: var(--green); font-weight: bold; font-size: 17px; }

  .appt-card .appt-title { font-size: 19px; font-weight: bold; }
  .appt-card .appt-date { font-size: 17px; color: var(--gray); margin-top: 2px; }
  .badge-soon {
    display: inline-block;
    background: linear-gradient(135deg, #ff8f3d, var(--orange));
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 8px;
    vertical-align: middle;
    box-shadow: 0 2px 8px rgba(230, 81, 0, 0.35);
  }
  .empty-note { color: var(--gray); font-size: 16px; }

  /* ---------- 家族ビュー ---------- */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .summary-card {
    background: var(--glass);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 14px;
    box-shadow: var(--shadow-card);
    border-top: 5px solid #9aa8a5;
    transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
  }
  .summary-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(23,48,43,0.14); }
  .summary-card.ok { border-top-color: var(--green); }
  .summary-card.warn { border-top-color: var(--orange); }
  .summary-card.wide { grid-column: 1 / -1; }
  .summary-card .label { font-size: 14px; color: var(--gray); }
  .summary-card .value { font-size: 21px; font-weight: bold; margin-top: 4px; }
  .summary-card .value.ok { color: var(--green); }
  .summary-card .value.warn { color: var(--orange); }
  .summary-card .sub { font-size: 15px; color: var(--gray); margin-top: 2px; }

  .ai-summary {
    background: linear-gradient(135deg, rgba(227,242,253,0.8), rgba(209,233,252,0.65));
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.75);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    font-size: 17px;
    box-shadow: 0 8px 24px rgba(21, 101, 192, 0.10);
  }
  .ai-summary .label { font-size: 14px; color: #1565c0; font-weight: bold; display: block; margin-bottom: 6px; }

  .timeline-item {
    display: flex;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(23, 48, 43, 0.08);
    font-size: 17px;
  }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-time { color: var(--gray); font-size: 16px; flex-shrink: 0; width: 56px; }
  .timeline-icon { flex-shrink: 0; }

  .appt-form { display: flex; flex-direction: column; gap: 10px; }
  .appt-form input {
    font-size: 18px;
    padding: 12px;
    border: 1.5px solid rgba(23, 48, 43, 0.18);
    background: rgba(255, 255, 255, 0.7);
    border-radius: 12px;
    width: 100%;
    font-family: inherit;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .appt-form input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 105, 92, 0.15);
  }
  .appt-form button {
    border: none;
    background: linear-gradient(145deg, #00897b, #00695c);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    font-family: inherit;
    min-height: 54px;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0, 105, 92, 0.28), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.18s var(--ease-out), box-shadow 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .appt-form button:hover { transform: translateY(-2px); }
  .appt-form button:active { transform: translateY(1px) scale(0.98); }
  .appt-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(23, 48, 43, 0.08);
    font-size: 17px;
  }
  .appt-list-item:last-child { border-bottom: none; }

  footer {
    text-align: center;
    color: var(--gray);
    font-size: 13px;
    padding: 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  /* ---------- ヘッダー右上の設定ボタン ---------- */
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .btn-gear {
    border: none;
    background: rgba(255, 255, 255, 0.55);
    width: 44px; height: 44px;
    border-radius: 13px;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(23, 48, 43, 0.10), inset 0 1px 0 #fff;
    transition: transform 0.18s var(--ease-out);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-gear:hover { transform: translateY(-1px); }
  .btn-gear:active { transform: scale(0.9); }

  /* ---------- はじめる画面（初回起動） ---------- */
  .welcome { text-align: center; padding-top: 56px; }
  .welcome-icon {
    width: 108px; height: 108px;
    border-radius: 27px;
    box-shadow: 0 14px 36px rgba(23, 48, 43, 0.28);
  }
  .welcome-title {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 6px;
    margin-top: 20px;
    background: linear-gradient(120deg, #00796b, #2e9e6b);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome-sub {
    font-size: 18px;
    color: var(--gray);
    line-height: 1.9;
    margin: 14px 0 34px;
  }
  .welcome-start {
    display: block;
    max-width: 300px;
    margin: 0 auto;
    font-size: 20px;
    min-height: 64px;
  }

  /* ---------- 初回の利用者選択 ---------- */
  .role-select { text-align: center; padding-top: 20px; }
  .role-title { font-size: 24px; font-weight: bold; line-height: 1.5; margin-bottom: 22px; }
  .role-card {
    display: block;
    width: 100%;
    margin-bottom: 14px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    backdrop-filter: blur(14px) saturate(1.3);
    border: 2px solid rgba(255, 255, 255, 0.85);
    border-radius: 26px;
    padding: 26px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    box-shadow: var(--shadow-card);
    transition: transform 0.18s var(--ease-out), box-shadow 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .role-card:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(23,48,43,0.16); }
  .role-card:active { transform: scale(0.97); }
  .role-emoji { font-size: 54px; display: block; }
  .role-name { font-size: 26px; font-weight: bold; display: block; margin-top: 6px; }
  .role-desc { font-size: 17px; color: var(--gray); display: block; margin-top: 4px; }
  .role-note { color: var(--gray); font-size: 15px; margin-top: 10px; }

  /* ---------- 設定モーダル ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(23, 48, 43, 0.35);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 360px;
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 26px;
    padding: 22px;
    box-shadow: 0 24px 60px rgba(23, 48, 43, 0.30);
    animation: pop 0.35s var(--ease-spring);
  }
  .modal h2 { font-size: 21px; margin-bottom: 16px; }
  .modal-label { font-size: 15px; color: var(--gray); margin-bottom: 8px; }
  .modal-section { margin-bottom: 18px; }
  .role-switch { display: flex; gap: 10px; }
  .role-switch button {
    flex: 1;
    font-family: inherit;
    font-size: 18px;
    font-weight: bold;
    line-height: 1.4;
    padding: 12px 4px;
    border-radius: 16px;
    cursor: pointer;
    border: 2px solid rgba(23, 48, 43, 0.15);
    background: rgba(255, 255, 255, 0.7);
    color: var(--text);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .role-switch button small { font-size: 13px; font-weight: normal; color: var(--gray); }
  .role-switch button.current {
    border-color: var(--green);
    background: linear-gradient(145deg, rgba(232,245,233,0.95), rgba(200,230,201,0.8));
    color: var(--green-deep);
    box-shadow: 0 4px 14px rgba(46, 125, 50, 0.22);
  }
  .role-switch button.current small { color: var(--green); }
  .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 16px; cursor: pointer; }

<body>
<div class="app">
  <header>
    <div class="header-top">
      <div>
        <span class="logo">まもりわ</span><span class="logo-sub">高齢者見守りアプリ</span>
      </div>
      <button class="btn-gear" id="btn-gear" onclick="openSettings()" aria-label="せってい">⚙️</button>
    </div>
    <div class="tabs" id="tabs" data-view="person">
      <div class="tab-indicator"></div>
      <button id="tab-person" onclick="switchView('person')">本人ビュー</button>
      <button id="tab-family" onclick="switchView('family')">家族ビュー<span id="family-badge"></span></button>
    </div>
  </header>
  <main id="main"></main>
  <footer>まもりわ — はなれて暮らす家族に「だいじょうぶ」が届く</footer>
</div>

<!-- 設定モーダル -->
<div class="modal-backdrop" id="settings" onclick="if (event.target === this) closeSettings()">
  <div class="modal">
    <h2>⚙️ せってい</h2>
    <div class="modal-section">
      <div class="modal-label">利用者の切り替え</div>
      <div class="role-switch">
        <button id="set-role-person" onclick="setRole('person')">👵 本人<br><small>きろくする</small></button>
        <button id="set-role-family" onclick="setRole('family')">👨‍👩‍👧 家族<br><small>みまもる</small></button>
      </div>
    </div>
    <div class="modal-section" id="group-section"></div>
    <div class="modal-section">
      <label class="toggle-row">
        <input type="checkbox" id="tabs-toggle" onchange="toggleTabs(this.checked)">
        本人と家族の画面を切り替えるタブを表示する
      </label>
    </div>
    <div class="modal-section">
      <button class="btn-danger" onclick="resetDemo()">記録と設定をぜんぶ消して最初から</button>
    </div>
    <button class="btn-close" onclick="closeSettings()">とじる</button>
  </div>
</div>

<script src="firebase-config.js"></script>
<script>
/* =========================================================
   まもりわ 第1工程プロトタイプ
   - 単一HTML・アプリ内状態のみ（DB/ストレージなし）
   - 本人ビュー / 家族ビュー は同一状態を共有
   ========================================================= */

/* ---------- 状態（データモデルは引き継ぎ資料 第4章に準拠） ---------- */
const state = {
  medications: [],    // { id, name, scheduledTime, takenAt } 登録は家族ビューから
  moodLogs: [],       // { id, date, mood: 'good'|'normal'|'bad'|null, voiceNote }
  appointments: [],   // { id, title, date, notified } 登録は家族ビューから
  timeline: [],       // { time: Date, icon, text } 家族ビューの履歴用
  currentView: 'person',
  recording: false,
  lastChanged: null,  // 直前に記録された要素だけをポップ表示させるための目印
  groupCode: null,    // みまもりグループの6桁コード（参加中のみ）
  groupSetup: false,  // グループ設定画面を表示中
  groupCreated: false, // グループ作成直後のコード表示画面
};

const FAMILY_GRACE_MIN = 30;  // 予定時刻からこの分数を過ぎて未記録なら家族に「未服薬」注意
const MOOD_LABEL = { good: 'げんき', normal: 'ふつう', bad: 'ふちょう' };
const MOOD_FACE  = { good: '😊', normal: '😐', bad: '😞' };

// 音声認識は第1工程では見た目＋固定の文字起こし例で代替（資料 第2章）
const VOICE_TRANSCRIPT_EXAMPLE =
  '今日は天気がよかったから、庭の花に水をやったよ。ひざの調子もまあまあです。';

/* ---------- ユーティリティ ---------- */
function toLocalISO(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}
function addDaysISO(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return toLocalISO(d);
}
function todayISO() { return toLocalISO(new Date()); }
function fmtTime(date) {
  return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
}
function fmtDateJP(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const wd = ['日','月','火','水','木','金','土'][new Date(y, m - 1, d).getDay()];
  return m + '月' + d + '日（' + wd + '）';
}
function scheduledDate(med) {
  const [h, m] = med.scheduledTime.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}
function minutesPast(med) { return (Date.now() - scheduledDate(med).getTime()) / 60000; }
function isDue(med)       { return !med.takenAt && minutesPast(med) >= 0; }
function isFamilyAlert(med) { return !med.takenAt && minutesPast(med) >= FAMILY_GRACE_MIN; }
function daysUntil(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const target = new Date(y, m - 1, d);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / 86400000);
}
function addTimeline(icon, text) {
  state.timeline.unshift({ time: new Date(), icon, text });
}
function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ---------- 端末への保存（PWA用：閉じても記録が残る） ---------- */
const STORAGE_KEY = 'mamoriwa-state-v1';
function saveStateLocal() {
  const data = {
    savedDate: todayISO(),
    medications: state.medications,
    moodLogs: state.moodLogs,
    appointments: state.appointments,
    timeline: state.timeline.map(t => ({ icon: t.icon, text: t.text, time: t.time.toISOString() })),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function saveState() {
  saveStateLocal();
  syncPush();  // みまもりグループ参加中なら家族の端末にも反映
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.medications) state.medications = data.medications;
    if (data.moodLogs)    state.moodLogs = data.moodLogs;
    if (data.appointments) state.appointments = data.appointments;
    if (data.timeline)    state.timeline = data.timeline.map(t => ({ ...t, time: new Date(t.time) }));
    // 日付が変わっていたら「今日の記録」をリセット（体調履歴・予定は残す）
    if (data.savedDate !== todayISO()) {
      state.medications.forEach(m => { m.takenAt = null; });
      state.timeline = [];
      saveState();
    }
  } catch (e) {
    // 保存データが壊れていた場合は初期状態で開始する
    localStorage.removeItem(STORAGE_KEY);
  }
}
function resetDemo() {
  if (confirm('記録と利用者の設定をすべて消して、最初の状態に戻します。よろしいですか？')) {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(ROLE_KEY);
    localStorage.removeItem(TABS_KEY);
    localStorage.removeItem(GROUP_KEY);
    location.reload();
  }
}

/* ---------- 利用者（役割）と設定 ----------
   初回に「本人／家族」を選ぶと端末に保存され、次回からそのインターフェースで開く。
   変更はヘッダー右上の⚙️設定から。 */
const ROLE_KEY = 'mamoriwa-role';
const TABS_KEY = 'mamoriwa-tabs';
function chooseRole(role) {
  localStorage.setItem(ROLE_KEY, role);
  state.role = role;
  state.currentView = role;
  // グループ未参加なら、つづけてグループ設定へ（同期設定がある環境のみ）。
  // sync.enabled ではなく設定の有無で判定する：SDKの読み込みが終わる前に
  // タップが進んでもグループ設定を飛ばさないため
  state.groupSetup = !!window.MAMORIWA_FIREBASE_CONFIG && !state.groupCode && !state.fixedView;
  render(true);
}
function setRole(role) {
  chooseRole(role);
  closeSettings();
}
function openSettings() {
  document.getElementById('set-role-person').classList.toggle('current', state.role === 'person');
  document.getElementById('set-role-family').classList.toggle('current', state.role === 'family');
  document.getElementById('tabs-toggle').checked = state.tabsMode;
  // みまもりグループの状態表示
  let group;
  if (!sync.enabled) {
    group = '<div class="modal-label">みまもりグループ（家族との同期）</div>'
      + '<div class="empty-note" style="font-size:14px">この環境ではご利用いただけません</div>';
  } else if (state.groupCode) {
    group = '<div class="modal-label">みまもりグループ — 同期中 🔗</div>'
      + '<div class="group-code small">コード ' + esc(state.groupCode) + '</div>'
      + '<button class="btn-danger" style="margin-top:8px" onclick="uiLeaveGroup()">グループから退出する</button>';
  } else {
    group = '<div class="modal-label">みまもりグループ（家族との同期）</div>'
      + '<button class="btn-close" style="padding:12px" onclick="openGroupSetup()">グループにつなげる／作る</button>';
  }
  document.getElementById('group-section').innerHTML = group;
  document.getElementById('settings').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings').classList.remove('open');
}
function toggleTabs(on) {
  state.tabsMode = on;
  localStorage.setItem(TABS_KEY, on ? '1' : '0');
  render();
}

/* ========== みまもりグループ（家族とのデータ同期） ==========
   仕組み：家族が6桁コードでグループを作成 → 本人がコードを入力して参加。
   記録は Firestore の groups/{コード} に保存され、参加端末は約5秒ごとの
   ポーリングで取得する（Firestore REST API を使用。SDKのリアルタイム接続は
   大学・企業ネットワーク等のproxyで遮断されることがあるため、確実に通る
   通常のHTTPSリクエストだけで同期する）。
   firebase-config.js に設定が入っている場合のみ有効。
   設定がなければ従来どおり端末内保存のみのローカルモードで動く。 */
const GROUP_KEY = 'mamoriwa-group';
const SYNC_POLL_MS = 5000;
const sync = { enabled: false, docBase: null, pushTimer: null, pollTimer: null, pollNow: null, lastSeen: null };

function syncInit() {
  const config = window.MAMORIWA_FIREBASE_CONFIG;
  if (!config) return;
  // データベースIDは「default」：新しいFirebaseコンソールが作るIDで、
  // 旧来の「(default)」とは別物。SDKのfirestore()は「(default)」固定のため
  // ここではREST APIでdefaultを直接指定する
  sync.docBase = 'https://firestore.googleapis.com/v1/projects/' + config.projectId
    + '/databases/default/documents/groups/';
  // SDK（認証のみ使用）は設定がある端末だけ読み込む
  const load = (src) => new Promise((ok, ng) => {
    const s = document.createElement('script');
    s.src = src; s.onload = ok; s.onerror = ng;
    document.head.appendChild(s);
  });
  load('https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js')
    .then(() => load('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js'))
    .then(() => {
      firebase.initializeApp(config);
      // 匿名認証：Firestoreルールは「認証済み（アプリ経由）のみ読み書き可」なので、
      // 同期を使う前にサインインを済ませる。2回目以降は端末に保存された認証が自動復元される。
      firebase.auth().onAuthStateChanged((user) => {
        if (!user || sync.enabled) return;
        sync.enabled = true;
        if (state.groupCode) syncSubscribe();
        render();
      });
      firebase.auth().signInAnonymously().catch(() => {});
    })
    .catch(() => { /* SDKが読めない（オフライン等）場合はローカルモードで続行 */ });
}

/* Firestore REST：グループ文書は { json: 状態のJSON文字列, updatedAt } の2フィールド */
async function fsGet(code) {
  const token = await firebase.auth().currentUser.getIdToken();
  const res = await fetch(sync.docBase + code, { headers: { Authorization: 'Bearer ' + token } });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('fs-get-' + res.status);
  const doc = await res.json();
  return JSON.parse(doc.fields.json.stringValue);
}
async function fsSet(code, data) {
  const token = await firebase.auth().currentUser.getIdToken();
  const res = await fetch(sync.docBase + code, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: {
      json: { stringValue: JSON.stringify(data) },
      updatedAt: { stringValue: data.updatedAt },
    } }),
  });
  if (!res.ok) throw new Error('fs-set-' + res.status);
}

function sharedData() {
  return {
    savedDate: todayISO(),
    medications: state.medications,
    moodLogs: state.moodLogs,
    appointments: state.appointments,
    timeline: state.timeline.map(t => ({ icon: t.icon, text: t.text, time: t.time.toISOString() })),
    updatedAt: new Date().toISOString(),
  };
}

function syncPush() {
  if (!sync.enabled || !state.groupCode) return;
  clearTimeout(sync.pushTimer);
  sync.pushTimer = setTimeout(() => {
    const data = sharedData();
    sync.lastSeen = data.updatedAt;  // 自分の書き込みをポーリングで再適用しない
    fsSet(state.groupCode, data).catch(() => {});
  }, 300);
}

function applyRemote(data) {
  state.medications = data.medications || [];
  state.moodLogs = data.moodLogs || [];
  state.appointments = data.appointments || [];
  state.timeline = (data.timeline || []).map(t => ({ ...t, time: new Date(t.time) }));
  if (data.savedDate !== todayISO()) {
    // 日付が変わっていたら「今日の記録」をリセットし、グループにも反映
    state.medications.forEach(m => { m.takenAt = null; });
    state.timeline = [];
    saveState();
  } else {
    saveStateLocal();
  }
  render();
}

function syncSubscribe() {
  syncStopPolling();
  const poll = async () => {
    if (!state.groupCode || document.visibilityState === 'hidden') return;
    try {
      const data = await fsGet(state.groupCode);
      if (data && data.updatedAt !== sync.lastSeen) {
        sync.lastSeen = data.updatedAt;
        applyRemote(data);
      }
    } catch (e) { /* 一時的な通信エラーは次のポーリングで回復する */ }
  };
  sync.pollNow = poll;
  sync.pollTimer = setInterval(poll, SYNC_POLL_MS);
  poll();
}

function syncStopPolling() {
  if (sync.pollTimer) { clearInterval(sync.pollTimer); sync.pollTimer = null; }
  sync.pollNow = null;
}

// 画面に戻ってきたら待たずに即同期（スマホでアプリを開き直した時など）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && sync.pollNow) sync.pollNow();
});

async function createGroup() {
  // 6桁の数字コード：家族が電話でも本人に伝えやすい形式
  for (let i = 0; i < 5; i++) {
    const code = String(Math.floor(100000 + Math.random() * 900000));
    const existing = await fsGet(code);
    if (existing === null) {
      state.groupCode = code;
      localStorage.setItem(GROUP_KEY, code);
      const data = sharedData();
      sync.lastSeen = data.updatedAt;
      await fsSet(code, data);
      syncSubscribe();
      return code;
    }
  }
  throw new Error('code-collision');
}

async function joinGroup(code) {
  const data = await fsGet(code);
  if (data === null) return false;
  state.groupCode = code;
  localStorage.setItem(GROUP_KEY, code);
  sync.lastSeen = data.updatedAt;
  applyRemote(data);  // 参加時はグループ側のデータを正とする
  syncSubscribe();
  return true;
}

function leaveGroup() {
  syncStopPolling();
  state.groupCode = null;
  localStorage.removeItem(GROUP_KEY);
}

/* ---------- グループ設定のUI操作 ---------- */
async function uiCreateGroup() {
  if (!sync.enabled) { alert('通信のじゅんび中です。すこし待って、もういちど おしてください'); return; }
  const btn = document.getElementById('btn-create-group');
  if (btn) { btn.disabled = true; btn.querySelector('.role-name').textContent = '作成中…'; }
  try {
    await createGroup();
    state.groupSetup = false;
    state.groupCreated = true;  // コード表示画面へ
  } catch (e) {
    alert('グループを作れませんでした。通信環境を確認してもう一度おためしください。');
  }
  render(true);
}
async function uiJoinGroup() {
  if (!sync.enabled) { alert('通信のじゅんび中です。すこし待って、もういちど おしてください'); return; }
  const code = document.getElementById('group-code-input').value.trim();
  if (!/^\d{6}$/.test(code)) { alert('6けたの数字コードを入れてください'); return; }
  const ok = await joinGroup(code).catch(() => false);
  if (!ok) { alert('そのコードのグループが見つかりません。コードをたしかめてください。'); return; }
  state.groupSetup = false;
  render(true);
}
function skipGroup() {
  state.groupSetup = false;
  render(true);
}
function openGroupSetup() {
  state.groupSetup = true;
  closeSettings();
  render(true);
}
function closeGroupCreated() {
  state.groupCreated = false;
  render(true);
}
function uiLeaveGroup() {
  if (confirm('みまもりグループから退出します。よろしいですか？（記録はこの端末に残ります）')) {
    leaveGroup();
    closeSettings();
    render();
  }
}

/* ---------- 操作（本人ビュー） ---------- */
function takeMed(id) {
  const med = state.medications.find(m => m.id === id);
  if (!med || med.takenAt) return;
  med.takenAt = fmtTime(new Date());
  addTimeline('💊', med.name + ' を服薬しました（' + med.takenAt + '）');
  state.lastChanged = id;
  saveState();
  render();
}
function undoMed(id) {
  const med = state.medications.find(m => m.id === id);
  if (!med) return;
  med.takenAt = null;
  state.timeline = state.timeline.filter(t => !(t.icon === '💊' && t.text.startsWith(med.name)));
  saveState();
  render();
}
function recordMood(mood) {
  state.moodLogs.push({ id: 'mood' + Date.now(), date: todayISO(), mood, voiceNote: null });
  addTimeline(MOOD_FACE[mood], '体調を記録：' + MOOD_LABEL[mood]);
  state.lastChanged = 'mood-' + mood;
  saveState();
  render();
}
/* 音声入力：Web Speech API（ブラウザ内蔵の音声認識）で実際に文字起こしする。
   iPhoneのSafari・AndroidのChromeとも対応。マイク許可が必要（HTTPS上で動作）。
   非対応ブラウザでは固定の文字起こし例で代替し、デモが止まらないようにする。 */
let recognizer = null;
function startVoice() {
  if (state.recording) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { startVoiceFallback(); return; }
  recognizer = new SR();
  recognizer.lang = 'ja-JP';
  recognizer.interimResults = false;
  recognizer.maxAlternatives = 1;
  let done = false;
  recognizer.onresult = (e) => {
    done = true;
    finishVoice(e.results[0][0].transcript);
  };
  recognizer.onerror = (e) => {
    if (done) return;
    done = true;
    finishVoice(null, e.error === 'not-allowed'
      ? 'マイクが つかえませんでした。ブラウザの設定で マイクを ゆるしてください'
      : 'うまく ききとれませんでした。もういちど おためしください');
  };
  recognizer.onend = () => {
    if (!done) { done = true; finishVoice(null, 'うまく ききとれませんでした。もういちど おためしください'); }
  };
  state.recording = true;
  state.voiceMsg = null;
  render();
  recognizer.start();
}
function stopVoice() {
  if (recognizer) recognizer.stop();  // 結果はonresult / onendで処理される
}
function finishVoice(text, errMsg) {
  state.recording = false;
  recognizer = null;
  if (text) {
    state.voiceMsg = null;
    state.moodLogs.push({ id: 'voice' + Date.now(), date: todayISO(), mood: null, voiceNote: text });
    addTimeline('🎤', '声のメッセージ：「' + text + '」');
    state.lastChanged = 'voice';
    saveState();
  } else {
    state.voiceMsg = errMsg;
  }
  render();
}
function startVoiceFallback() {
  // 音声認識が使えない環境：2.5秒の「録音中」表示ののち固定の文字起こし例を記録
  state.recording = true;
  state.voiceMsg = null;
  render();
  setTimeout(() => {
    state.recording = false;
    state.moodLogs.push({ id: 'voice' + Date.now(), date: todayISO(), mood: null, voiceNote: VOICE_TRANSCRIPT_EXAMPLE });
    addTimeline('🎤', '声のメッセージ：「' + VOICE_TRANSCRIPT_EXAMPLE + '」');
    state.lastChanged = 'voice';
    saveState();
    render();
  }, 2500);
}

/* ---------- 操作（家族ビュー） ---------- */
function addMedication(ev) {
  ev.preventDefault();
  const name = document.getElementById('med-name').value.trim();
  const time = document.getElementById('med-time').value;
  if (!name || !time) return;
  state.medications.push({ id: 'm' + Date.now(), name, scheduledTime: time, takenAt: null });
  state.medications.sort((a, b) => a.scheduledTime.localeCompare(b.scheduledTime));
  addTimeline('💊', 'お薬を登録：' + name + '（' + time + '）');
  saveState();
  render();
}
function removeMedication(id) {
  const med = state.medications.find(m => m.id === id);
  if (!med) return;
  if (!confirm('「' + med.name + '」を削除します。よろしいですか？')) return;
  state.medications = state.medications.filter(m => m.id !== id);
  addTimeline('💊', 'お薬を削除：' + med.name);
  saveState();
  render();
}

function addAppointment(ev) {
  ev.preventDefault();
  const title = document.getElementById('appt-title').value.trim();
  const date = document.getElementById('appt-date').value;
  if (!title || !date) return;
  state.appointments.push({ id: 'a' + Date.now(), title, date, notified: false });
  state.appointments.sort((a, b) => a.date.localeCompare(b.date));
  addTimeline('📅', '予定を追加：' + title + '（' + fmtDateJP(date) + '）');
  saveState();
  render();
}

/* ---------- 派生データ ---------- */
function todayMood() {
  const logs = state.moodLogs.filter(l => l.date === todayISO() && l.mood);
  return logs.length ? logs[logs.length - 1].mood : null;
}
function todayVoiceNote() {
  const logs = state.moodLogs.filter(l => l.date === todayISO() && l.voiceNote);
  return logs.length ? logs[logs.length - 1].voiceNote : null;
}
function nextAppointment() {
  return state.appointments.filter(a => daysUntil(a.date) >= 0)[0] || null;
}
function takenCount() { return state.medications.filter(m => m.takenAt).length; }
function familyAlertMeds() { return state.medications.filter(isFamilyAlert); }

/* AI要約：本格実装ではLLM APIを想定。プロトタイプでは状態から組み立てる例文表示（資料 第2章） */
function aiSummary() {
  const total = state.medications.length;
  const taken = takenCount();
  const parts = [];
  parts.push(total
    ? '今日のお薬は' + total + '回のうち' + taken + '回が記録済みです。'
    : 'お薬はまだ登録されていません。');
  const alerts = familyAlertMeds();
  if (alerts.length) parts.push(alerts.map(m => m.scheduledTime + 'の' + m.name).join('、') + 'がまだ記録されていません。');
  const mood = todayMood();
  parts.push(mood ? '体調は「' + MOOD_LABEL[mood] + '」と記録されています。' : '今日の体調はまだ記録されていません。');
  const voice = todayVoiceNote();
  if (voice) parts.push('声のメッセージでは、普段どおりの生活の様子がうかがえます。');
  const appt = nextAppointment();
  if (appt) parts.push('次の予定は' + fmtDateJP(appt.date) + 'の「' + appt.title + '」です。');
  return parts.join('');
}

/* ---------- 描画 ---------- */
function switchView(view) {
  state.currentView = view;
  render(true);  // ビュー切り替え時だけ、ふわっと表示のアニメーションを付ける
}

function render(animate = false) {
  const choosing = !state.fixedView && !state.role;  // 初回：利用者が未選択
  const setup = !choosing && (state.groupSetup || state.groupCreated);  // グループ設定中
  const tabs = document.getElementById('tabs');
  const gear = document.getElementById('btn-gear');
  // タブは設定でONのときだけ表示。⚙️は利用開始後に表示（URL固定時は非表示）
  tabs.style.display = (!choosing && !setup && !state.fixedView && state.tabsMode) ? '' : 'none';
  gear.style.display = (!choosing && !setup && !state.fixedView) ? '' : 'none';
  tabs.dataset.view = state.currentView;
  document.getElementById('tab-person').classList.toggle('active', state.currentView === 'person');
  document.getElementById('tab-family').classList.toggle('active', state.currentView === 'family');
  const alerts = familyAlertMeds().length;
  document.getElementById('family-badge').innerHTML =
    alerts ? '<span class="badge">' + alerts + '</span>' : '';
  const main = document.getElementById('main');
  main.className = animate ? 'anim' : '';
  main.innerHTML = choosing ? (state.welcomeDone ? renderRoleSelect() : renderWelcome())
    : state.groupCreated ? renderGroupCreated()
    : state.groupSetup ? renderGroupSetup()
    : state.currentView === 'person' ? renderPerson() : renderFamily();
  state.lastChanged = null;
}

/* ---------- はじめる画面（初回起動） ---------- */
function renderWelcome() {
  return '<div class="welcome">'
    + '<img class="welcome-icon" src="icons/icon-192.png" alt="まもりわ">'
    + '<div class="welcome-title">まもりわ</div>'
    + '<div class="welcome-sub">はなれて暮らす家族に<br>「だいじょうぶ」が届く<br>見守りアプリ</div>'
    + '<button class="btn-close welcome-start" onclick="startOnboarding()">はじめる</button>'
    + '</div>';
}
function startOnboarding() {
  state.welcomeDone = true;
  render(true);
}

/* ---------- グループ設定画面 ---------- */
function groupJoinFormHTML() {
  return '<div class="group-join">'
    + '<input id="group-code-input" type="tel" inputmode="numeric" maxlength="6" placeholder="123456">'
    + '<button onclick="uiJoinGroup()">つなげる</button>'
    + '</div>';
}

function renderGroupSetup() {
  let html = '<div class="role-select">';
  if (state.role === 'family') {
    html += '<div class="role-title">みまもりグループを<br>つくりましょう</div>'
      + '<button class="role-card" id="btn-create-group" onclick="uiCreateGroup()">'
      +   '<span class="role-emoji">🔗</span>'
      +   '<span class="role-name">グループを作る</span>'
      +   '<span class="role-desc">6けたのコードが発行されます</span></button>'
      + '<div class="group-divider">— すでにコードがある場合 —</div>'
      + groupJoinFormHTML();
  } else {
    html += '<div class="role-title">かぞくと<br>つながりますか？</div>'
      + '<div class="card" style="text-align:center">'
      +   '<div class="modal-label" style="margin-bottom:10px">家族から聞いた 6けたのコードを入れてください</div>'
      +   groupJoinFormHTML()
      + '</div>';
  }
  html += '<button class="btn-skip" onclick="skipGroup()">あとでつなげる（まず ひとりで使う）</button>'
    + '</div>';
  return html;
}

function renderGroupCreated() {
  return '<div class="role-select">'
    + '<div class="role-title">グループが<br>できました！</div>'
    + '<div class="card group-code-card">'
    +   '<div class="modal-label">みまもりコード</div>'
    +   '<div class="group-code">' + esc(state.groupCode || '') + '</div>'
    +   '<div class="role-desc">本人のスマホで「まもりわ」をひらいて、このコードを入力してもらってください</div>'
    + '</div>'
    + '<button class="btn-close" onclick="closeGroupCreated()">はじめる</button>'
    + '<div class="role-note">コードはあとから ⚙️ せってい でも確認できます</div>'
    + '</div>';
}

function renderRoleSelect() {
  return '<div class="role-select">'
    + '<div class="role-title">はじめまして！<br>どちらの利用者ですか？</div>'
    + '<button class="role-card" onclick="chooseRole(\'person\')">'
    +   '<span class="role-emoji">👵</span>'
    +   '<span class="role-name">本人</span>'
    +   '<span class="role-desc">じぶんで きろくする</span></button>'
    + '<button class="role-card" onclick="chooseRole(\'family\')">'
    +   '<span class="role-emoji">👨‍👩‍👧</span>'
    +   '<span class="role-name">家族</span>'
    +   '<span class="role-desc">はなれて みまもる</span></button>'
    + '<div class="role-note">あとから右上の ⚙️ せってい で変更できます</div>'
    + '</div>';
}

function renderPerson() {
  const now = new Date();
  const greet = now.getHours() < 11 ? 'おはようございます' : now.getHours() < 18 ? 'こんにちは' : 'こんばんは';
  let html = '<div class="date-header"><div class="date">' + fmtDateJP(todayISO()) + '</div>'
           + '<div class="greet">' + greet + '</div></div>';

  // 服薬リマインド：設定時刻を過ぎて未記録なら画面内アラート（プッシュ通知の代替表現）
  const dueMeds = state.medications.filter(isDue);
  if (dueMeds.length) {
    html += '<div class="alert"><span class="alert-icon">⏰</span> お薬の時間です<br>'
          + dueMeds.map(m => m.scheduledTime + '　' + esc(m.name)).join('<br>') + '</div>';
  }

  // ① 服薬チェック（中心機能）
  html += '<div class="section-title">💊 今日のおくすり</div>';
  if (!state.medications.length) {
    html += '<div class="card empty-note">お薬は まだ登録されていません。<br>ご家族の画面から 登録できます。</div>';
  }
  for (const med of state.medications) {
    if (med.takenAt) {
      const justTaken = state.lastChanged === med.id;
      html += '<div class="card med-card taken">'
            + '<span class="taken-mark' + (justTaken ? ' pop' : '') + '">✅</span>'
            + '<div class="med-info"><div class="med-name">' + esc(med.name) + '</div>'
            + '<div class="med-status-taken">' + med.takenAt + ' にのみました</div></div>'
            + '<button class="btn-undo" onclick="undoMed(\'' + med.id + '\')">取り消す</button>'
            + '</div>';
    } else {
      const due = isDue(med);
      html += '<div class="card med-card' + (due ? ' due' : '') + '">'
            + '<div class="med-info"><div class="med-name">' + esc(med.name) + '</div>'
            + (due
                ? '<div class="med-status-due">' + med.scheduledTime + ' の予定（時間になりました）</div>'
                : '<div class="med-time">' + med.scheduledTime + ' の予定</div>')
            + '</div>'
            + '<button class="btn-take" onclick="takeMed(\'' + med.id + '\')">のんだ</button>'
            + '</div>';
    }
  }

  // ② 今日のひとこと（体調・生活記録）
  const mood = todayMood();
  html += '<div class="section-title">🗣️ きょうのひとこと</div><div class="card">'
        + '<div class="mood-buttons">'
        + ['good', 'normal', 'bad'].map(m =>
            '<button class="mood-btn' + (mood === m ? ' selected' : '') + '" onclick="recordMood(\'' + m + '\')">'
            + '<span class="face' + (state.lastChanged === 'mood-' + m ? ' pop' : '') + '">' + MOOD_FACE[m] + '</span>' + MOOD_LABEL[m] + '</button>'
          ).join('')
        + '</div>';
  html += state.recording
        ? '<button class="btn-voice recording" onclick="stopVoice()"><span class="dot"></span>ろくおん中… はなしおわったら タップ</button>'
        : '<button class="btn-voice" onclick="startVoice()">🎤 こえで つたえる</button>';
  if (state.voiceMsg) {
    html += '<div class="voice-msg">' + esc(state.voiceMsg) + '</div>';
  }
  const voice = todayVoiceNote();
  if (voice) {
    html += '<div class="voice-note' + (state.lastChanged === 'voice' ? ' pop' : '') + '">'
          + '<span class="label">きょうの こえのメッセージ（文字起こし）</span>' + esc(voice) + '</div>';
  }
  if (mood) html += '<div class="done-msg">✅ きょうの体調を記録しました（家族に届いています）</div>';
  html += '</div>';

  // ③ 次の予定
  html += '<div class="section-title">📅 つぎのよてい</div>';
  const appt = nextAppointment();
  if (appt) {
    const days = daysUntil(appt.date);
    const soon = days <= 3;
    html += '<div class="card appt-card">'
          + '<div class="appt-title">' + esc(appt.title)
          + (soon ? '<span class="badge-soon">' + (days === 0 ? 'きょう' : 'あと' + days + '日') + '</span>' : '')
          + '</div>'
          + '<div class="appt-date">' + fmtDateJP(appt.date) + '</div></div>';
  } else {
    html += '<div class="card empty-note">よていは ありません</div>';
  }
  return html;
}

function renderFamily() {
  let html = '<div class="date-header"><div class="date">お母さんの きょうの様子</div>'
           + '<div class="greet">' + fmtDateJP(todayISO()) + '</div></div>';

  // 未服薬の注意表示（一定時間記録がない場合）
  const alerts = familyAlertMeds();
  if (alerts.length) {
    html += '<div class="alert"><span class="alert-icon">⚠️</span> 未服薬の注意<br>'
          + alerts.map(m => m.scheduledTime + 'の「' + esc(m.name) + '」がまだ記録されていません').join('<br>')
          + '</div>';
  }

  // ④ 家族ダッシュボード：今日のサマリー
  const total = state.medications.length;
  const taken = takenCount();
  const medOk = alerts.length === 0;
  const mood = todayMood();
  const appt = nextAppointment();
  html += '<div class="summary-grid">'
        + '<div class="summary-card ' + (total === 0 ? '' : medOk ? 'ok' : 'warn') + '">'
        +   '<div class="label">💊 服薬</div>'
        +   '<div class="value ' + (total === 0 ? '' : medOk ? 'ok' : 'warn') + '">'
        +     (total === 0 ? '未登録' : taken + ' / ' + total + ' 済み') + '</div>'
        +   '<div class="sub">' + (total === 0 ? '「お薬の管理」から登録できます' : medOk ? '順調です' : '未服薬あり') + '</div></div>'
        + '<div class="summary-card ' + (mood ? (mood === 'bad' ? 'warn' : 'ok') : '') + '">'
        +   '<div class="label">🗣️ きょうの体調</div>'
        +   '<div class="value ' + (mood === 'bad' ? 'warn' : mood ? 'ok' : '') + '">'
        +     (mood ? MOOD_FACE[mood] + ' ' + MOOD_LABEL[mood] : '未記録') + '</div>'
        +   '<div class="sub">' + (mood ? '本人が記録しました' : 'まだ記録がありません') + '</div></div>'
        + '<div class="summary-card wide ' + (appt ? 'ok' : '') + '">'
        +   '<div class="label">📅 つぎの予定</div>'
        +   '<div class="value">' + (appt ? esc(appt.title) : 'なし') + '</div>'
        +   (appt ? '<div class="sub">' + fmtDateJP(appt.date)
              + (daysUntil(appt.date) <= 3 ? '　<span class="badge-soon">まもなく</span>' : '') + '</div>' : '')
        + '</div></div>';

  // AI要約（本格実装ではLLM API。プロトタイプでは自動生成の例文）
  html += '<div class="section-title">🤖 AI要約</div>'
        + '<div class="ai-summary"><span class="label">きょうの様子まとめ</span>'
        + esc(aiSummary()) + '</div>';

  // 記録履歴（本人の記録がリアルタイムに反映される）
  html += '<div class="section-title">📋 きろくの履歴</div><div class="card">';
  if (state.timeline.length) {
    html += state.timeline.map(t =>
      '<div class="timeline-item"><span class="timeline-time">' + fmtTime(t.time) + '</span>'
      + '<span class="timeline-icon">' + t.icon + '</span><span>' + esc(t.text) + '</span></div>'
    ).join('');
  } else {
    html += '<div class="empty-note">まだ きょうの記録はありません</div>';
  }
  html += '</div>';

  // ① お薬の管理（登録・削除は家族側から）
  html += '<div class="section-title">💊 お薬の管理</div><div class="card">';
  if (state.medications.length) {
    html += state.medications.map(m =>
      '<div class="appt-list-item"><span>' + esc(m.name) + '　<small style="color:var(--gray)">'
      + m.scheduledTime + '</small></span>'
      + '<button class="btn-undo" onclick="removeMedication(\'' + m.id + '\')">削除</button></div>'
    ).join('');
  } else {
    html += '<div class="empty-note">まだお薬が登録されていません。毎日飲むお薬を登録すると、本人の画面に表示されます。</div>';
  }
  html += '<form class="appt-form" style="margin-top:12px" onsubmit="addMedication(event)">'
        + '<input id="med-name" type="text" placeholder="お薬の名前（例：血圧の薬）">'
        + '<input id="med-time" type="time" value="08:00">'
        + '<button type="submit">＋ お薬を登録する</button></form></div>';

  // ③ 通院・予定管理（登録は家族側から行う想定）
  html += '<div class="section-title">📅 予定の管理</div><div class="card">';
  if (state.appointments.length) {
    html += state.appointments.map(a => {
      const days = daysUntil(a.date);
      return '<div class="appt-list-item"><span>' + esc(a.title) + '　<small style="color:var(--gray)">'
        + fmtDateJP(a.date) + '</small></span>'
        + (days >= 0 && days <= 3 ? '<span class="badge-soon">' + (days === 0 ? 'きょう' : 'あと' + days + '日') + '</span>' : '')
        + '</div>';
    }).join('');
  }
  html += '<form class="appt-form" style="margin-top:12px" onsubmit="addAppointment(event)">'
        + '<input id="appt-title" type="text" placeholder="予定の名前（例：内科 定期通院）">'
        + '<input id="appt-date" type="date" value="' + addDaysISO(7) + '">'
        + '<button type="submit">＋ 予定を追加する</button></form></div>';

  return html;
}

/* ---------- 初期化：時刻経過でリマインド状態が変わるため定期再描画 ---------- */
loadState();

/* 表示するインターフェースの決定（優先順）：
   1. URLの ?view=person / ?view=family（配布用の固定リンク。⚙️も隠す）
   2. 端末に保存された利用者の選択（⚙️設定でいつでも変更可）
   3. どちらもなければ初回の利用者選択画面
   ※ 端末間のデータ同期は第2工程（バックエンド実装）で対応 */
const fixedViewParam = new URLSearchParams(location.search).get('view');
state.fixedView = (fixedViewParam === 'person' || fixedViewParam === 'family') ? fixedViewParam : null;
state.role = localStorage.getItem(ROLE_KEY);
state.tabsMode = localStorage.getItem(TABS_KEY) === '1';
state.groupCode = localStorage.getItem(GROUP_KEY);
if (state.fixedView)   state.currentView = state.fixedView;
else if (state.role)   state.currentView = state.role;

syncInit();  // firebase-config.js に設定があれば「みまもりグループ」同期を起動
render(true);
setInterval(() => render(), 30000);

/* PWA：オフラインでも開けるようService Workerを登録 */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
